name: Release

# Trigger on every annotated tag that looks like a version. Pushing
# `git tag v1.1.0 -m "..."` then `git push --tags` cuts a release.
#
# v1.1.0 expands the matrix from Windows-only to Windows + macOS +
# Linux. The dev-cycle workflows (macos-dev.yml + linux-dev.yml) cover
# the rolling tester loop on the v1.1-port branch; this file is for
# production tags only.
on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      # tauri-action creates a GitHub Release + uploads installers +
      # latest.json. That requires write access to the repo's contents.
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
          - platform: 'macos-latest'
            # Universal binary covers Apple Silicon + Intel from one DMG.
            # ~5 MB extra over a single-arch build; Intel Mac users covered.
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            # Lock to 22.04 (glibc 2.35) for AppImage portability.
            # Building on newer Ubuntu would bake in a glibc that breaks
            # on older distros.
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          # No `cache` field on purpose — this repo has no package-lock.json
          # in the canonical sense (Cargo handles Rust deps separately).

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Set Mac targets so --target universal-apple-darwin works on
          # the macos-latest runner. No-op on the Windows + Linux jobs.
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        # webkit2gtk-4.1 is Tauri 2's required WebView runtime;
        # libasound2-dev is needed by cpal (audio capture) — alsa-sys
        # fails to build without alsa.pc on the system. The rest are
        # bundler prerequisites for .deb / .rpm / .AppImage.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libasound2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build + sign + release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The minisign private signing key (contents of bulbul.key)
          # and its passphrase. Set in repo Settings → Secrets and
          # variables → Actions. tauri-action passes them through to
          # `tauri build`, which uses them to sign the installer.
          # Platform-agnostic: the same key signs Win + Mac + Linux
          # bundles via the `tauri-plugin-updater` integration.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Tag → release mapping. github.ref_name is "v1.1.0" for a tag
          # push, which both names the release and labels the assets.
          tagName: ${{ github.ref_name }}
          releaseName: 'Bulbul ${{ github.ref_name }}'
          releaseBody: |
            ## What's new

            (Edit this in the GitHub Releases UI before publishing.)

            ## Install

            **Windows**:
            ```powershell
            irm https://bulbultypes.xyz/install.ps1 | iex
            ```

            **macOS**:
            ```sh
            curl -fsSL https://bulbultypes.xyz/install.sh | sh
            ```
            Direct DMG download: triggers Gatekeeper "unidentified developer" warning the first time. Right-click → Open → Open to bypass.

            **Linux** (Ubuntu 22.04+, Fedora, etc.):
            ```sh
            curl -fsSL https://bulbultypes.xyz/install.sh | sh
            ```
            Or download `.deb` / `.rpm` / `.AppImage` directly.

            See `latest.json` if you're wiring up auto-updates for a fork.

          # Drafts let you write proper release notes before going public.
          # Flip to false once you're confident in the pipeline.
          releaseDraft: true
          prerelease: false

          # tauri-action emits `latest.json` alongside the installers,
          # with version, URLs (per-platform), and signatures populated.
          # The endpoint in tauri.conf.json points to
          # /releases/latest/download/latest.json, so the running app
          # always picks up the most recent release.
          includeUpdaterJson: true

          args: ${{ matrix.args }}

  # Android APK, attached to the same draft release the desktop matrix
  # created. Runs after publish-tauri so the release exists to upload
  # into. Release-signed with the Bulbul keystore when the ANDROID_KEYSTORE_*
  # secrets are set (so public users get a stable signing identity and can
  # auto-update across releases); falls back to debug signing if they're
  # absent (e.g. on a fork) — still sideload-installable.
  publish-android:
    needs: publish-tauri
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Rust toolchain (Android arm64)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install frontend dependencies
        run: npm install

      - name: Restore Android release keystore (if configured)
        # Recreates gen/android/keystore.properties (+ the .jks) from repo
        # secrets so gradle picks the release signer over the debug fallback.
        # No-ops when the secret is unset (forks/PRs) — the build then debug-
        # signs, exactly as before. Requires repo secrets:
        #   ANDROID_KEYSTORE_BASE64   base64 of bulbul-release.jks (base64 -w0)
        #   ANDROID_KEYSTORE_PASSWORD  keystore (store) password
        #   ANDROID_KEY_ALIAS          key alias
        #   ANDROID_KEY_PASSWORD       key password
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 not set — APK will be debug-signed (fallback)."
            exit 0
          fi
          KS="$RUNNER_TEMP/bulbul-release.jks"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$KS"
          {
            echo "storeFile=$KS"
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
          } > src-tauri/gen/android/keystore.properties
          echo "Release keystore restored — APK will be release-signed."

      - name: Build APK (arm64)
        # tauri runs beforeBuildCommand (npm run build) itself, then the
        # Rust .so build + gradle assemble for the tracked gen/android
        # project. NDK comes preinstalled on the runner image.
        run: npx tauri android build --apk --target aarch64

      - name: Upload APK to the release
        run: |
          APK=$(find src-tauri/gen/android/app/build/outputs/apk -name '*.apk' -path '*release*' | head -n1)
          if [ -z "$APK" ]; then echo "No APK produced"; exit 1; fi
          OUT="bulbul-${GITHUB_REF_NAME#v}-arm64.apk"
          cp "$APK" "$OUT"
          gh release upload "$GITHUB_REF_NAME" "$OUT" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
