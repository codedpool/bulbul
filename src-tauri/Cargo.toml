[package]
name = "bulbul"
version = "0.1.0"
description = "Free, open-source Windows voice dictation powered by Groq"
authors = ["Bulbul contributors"]
edition = "2021"

[lib]
name = "bulbul_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon", "image-png"] }
tauri-plugin-opener = "2"
tauri-plugin-notification = "2"
tauri-plugin-updater = "2"
tauri-plugin-autostart = "2"
# OS-level RegisterHotKey, used because rdev's low-level hook is suppressed
# when Bulbul's own webview has focus.
tauri-plugin-global-shortcut = "2"

# Local persistence (activity log + V2 data)
rusqlite = { version = "0.31", features = ["bundled"] }

# Word-boundary text substitution for the dictionary feature
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Audio
cpal = "0.15"
hound = "3.5"

# HTTP / Groq
reqwest = { version = "0.12", default-features = false, features = ["multipart", "json", "rustls-tls"] }
tokio = { version = "1", features = ["full"] }

# Clipboard
arboard = "3"

# Win32 SendInput for Ctrl+V
[dependencies.windows]
version = "0.58"
features = [
    "Win32_UI_Input_KeyboardAndMouse",
    "Win32_UI_WindowsAndMessaging",
    "Win32_Foundation",
    "Win32_System_Threading",
]

[dependencies.anyhow]
version = "1"

[dependencies.dirs]
version = "5"

[dependencies.tracing]
version = "0.1"

[dependencies.tracing-subscriber]
version = "0.3"
features = ["env-filter"]

[dependencies.parking_lot]
version = "0.12"
